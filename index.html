<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title></title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="./liff-config.js?ver=4"></script> <!-- キャッシュ防止 -->
  <style>
    :root {
      --main-color: #06c755;
      --background: #f9f9f9;
      --input-border: #ccc;
      --font: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", sans-serif;
    }

    body {
      font-family: var(--font);
      background-color: var(--background);
      padding: 24px;
      color: #333;
    }

    h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
    }

    label {
      font-size: 14px;
      display: block;
      margin-bottom: 8px;
      color: #555;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 20px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background-color: var(--main-color);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:active {
      opacity: 0.8;
    }

    #copyStatus {
      margin-top: 16px;
      font-size: 14px;
      color: #28a745;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>家賃</h2>
  <form id="rentForm">
    <label>入力日</label>
    <input type="text" id="date" readonly>

    <label>金額(円)</label>
    <input
      type="number"
      inputmode="numeric"
      pattern="\d*"
      id="amount"
      required
      placeholder="例: 1234"
    />

    <button type="submit">コピー</button>
    <div id="copyStatus"></div>
  </form>

  <script>
    function formatDateToYMD(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, '0');
      const d = String(dateObj.getDate()).padStart(2, '0');
      return `${y}/${m}/${d}`;
    }

    window.onload = () => {
      const input = document.getElementById("date");
      if (input) {
        input.value = formatDateToYMD(new Date());
      }
    };

    document.getElementById("rentForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const date = document.getElementById("date").value;
      const amount = document.getElementById("amount").value;
      const message = `${date}, ${amount}, 家賃`;

      navigator.clipboard.writeText(message).then(() => {
        document.getElementById("copyStatus").textContent =
          "コピーしました。チャット欄に貼り付けて送信してください。";
      }).catch(err => {
        document.getElementById("copyStatus").textContent =
          "コピーに失敗しました。手動でコピーしてください。";
        console.error(err);
      });
    });
  </script>
</body>
</html>
